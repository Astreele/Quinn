name: Prettier Format

on:
  push:
    branches: [ "main", "dev" ] # Add other branches if needed
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      # Required to push the commit back to the repo
      contents: write 
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Required to trigger other actions upon commit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Use your project's Node version

      - name: Install dependencies
        run: npm ci # Or 'yarn install' / 'pnpm install' depending on your package manager

      - name: Run Prettier
        run: npx prettier --write .
        
      - name: Get commit message
        id: commit_msg
        run: echo "msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(prettier): ${{ steps.commit_msg.outputs.msg }}"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"