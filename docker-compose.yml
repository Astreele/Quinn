services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: quinn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quinn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quinn-network

  # Quinn Discord Bot
  quinn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quinn-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - PREFIX=${PREFIX:-$}
      - OWNER_ID=${OWNER_ID}
      - CLIENT_ID=${CLIENT_ID}
      - USE_TEST_GUILD=${USE_TEST_GUILD:-false}
      - TEST_GUILD_ID=${TEST_GUILD_ID}
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/quinn
      - DB_SSL=false
      - NODE_ENV=production
    env_file:
      - .env
    networks:
      - quinn-network

volumes:
  postgres_data:
    driver: local

networks:
  quinn-network:
    driver: bridge
